services:
  db:
    image: postgres:16-alpine
    container_name: emobot-db
    environment:
      POSTGRES_DB: emobot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - emobot_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d emobot"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emobot-backend
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: docker
      APP_DEBUG: "false"
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/emobot
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build:
      context: ./mobile
      dockerfile: Dockerfile.web
    container_name: emobot-web
    depends_on:
      - backend
    ports:
      - "18081:80"

volumes:
  emobot_pg_data:
